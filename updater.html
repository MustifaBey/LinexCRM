<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    body { background-color: #0f0f11; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; -webkit-app-region: drag; }
    .logo { width: 180px; animation: pulse 2s infinite ease-in-out; margin-bottom: 30px; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    .status { font-size: 12px; letter-spacing: 1px; color: #a1a1aa; margin-bottom: 10px; font-weight: bold; }
    .progress-bar { width: 250px; height: 6px; background-color: #27272a; border-radius: 4px; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background-color: #dc2626; transition: width 0.2s; }
  </style>
</head>
<body>
  <img src="public/logo.png" alt="Linex Logo" class="logo" id="logo">
  <div class="status" id="status-text">HOLD TIGHT — LOADING LINEXCRM</div>
  <div class="status" id="percent-text" style="font-size: 10px; color: #71717a;">0%</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

  <script>
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('update-progress', (event, progress) => {
      document.getElementById('progress-fill').style.width = progress.percent + '%';
      document.getElementById('percent-text').innerText = 'DOWNLOADING UPDATE: ' + Math.round(progress.percent) + '%';
    });
    ipcRenderer.on('update-ready-to-install', () => {
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('status-text').innerText = 'INSTALLING UPDATE...';
      document.getElementById('percent-text').innerText = 'Kurulum yapılıyor... Uygulama kısa süre içinde yeniden başlatılacak.';
    });
  </script>
</body>
</html>
